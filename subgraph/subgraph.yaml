specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AMM
    network: arbitrum-sepolia
    source:
      address: "0x8F5856FF91503BcE897712952D9152cd424EFB24"
      abi: AMM
      startBlock: 269145794
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - LiquidityAdd
        - LiquidityRemove
        - Pool
      abis:
        - name: AMM
          file: ./abis/AMM.json
      eventHandlers:
        - event: Swap(indexed address,address,uint256,uint256)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
      file: ./src/amm.ts
  - kind: ethereum
    name: GovToken
    network: arbitrum-sepolia
    source:
      address: "0x518f029A4E7BE8B9CE5bDd7188E80eA71B404b63"
      abi: GovToken
      startBlock: 269145767
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TokenTransfer
        - DelegateChanged
      abis:
        - name: GovToken
          file: ./abis/GovToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: DelegateChanged(indexed address,indexed address,indexed address)
          handler: handleDelegateChanged
      file: ./src/govtoken.ts
  - kind: ethereum
    name: Governor
    network: arbitrum-sepolia
    source:
      address: "0x7309A96DE45c3e1f70b59c4FE205786Bf50DE8ac"
      abi: Governor
      startBlock: 269145780
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - VoteCast
      abis:
        - name: Governor
          file: ./abis/Governor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
      file: ./src/governor.ts
