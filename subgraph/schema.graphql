type Swap @entity(immutable: true) {
  id: ID!
  user: Bytes!
  tokenIn: Bytes!
  amountIn: BigInt!
  amountOut: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type LiquidityAdd @entity(immutable: true) {
  id: ID!
  provider: Bytes!
  amountA: BigInt!
  amountB: BigInt!
  shares: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type LiquidityRemove @entity(immutable: true) {
  id: ID!
  provider: Bytes!
  amountA: BigInt!
  amountB: BigInt!
  shares: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type Pool @entity(immutable: false) {
  id: ID!
  totalSwaps: BigInt!
  totalVolumeA: BigInt!
  totalVolumeB: BigInt!
  lastUpdated: BigInt!
}

type TokenTransfer @entity(immutable: true) {
  id: ID!
  from: Bytes!
  to: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type DelegateChanged @entity(immutable: true) {
  id: ID!
  delegator: Bytes!
  fromDelegate: Bytes!
  toDelegate: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type Proposal @entity(immutable: false) {
  id: ID!
  proposer: Bytes!
  description: String!
  voteStart: BigInt!
  voteEnd: BigInt!
  state: String!
  createdAt: BigInt!
  queuedAt: BigInt
  executedAt: BigInt
  canceledAt: BigInt
  votes: [VoteCast!]! @derivedFrom(field: "proposal")
}

type VoteCast @entity(immutable: true) {
  id: ID!
  proposal: Proposal!
  voter: Bytes!
  support: Int!
  weight: BigInt!
  reason: String!
  timestamp: BigInt!
  blockNumber: BigInt!
}
