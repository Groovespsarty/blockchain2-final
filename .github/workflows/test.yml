name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Compile
        run: forge build

      - name: Run tests
        run: forge test
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Coverage
        run: forge coverage --ir-minimum --report summary
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Check formatting
        run: forge fmt --check

      - name: Solhint
        run: npx solhint "src/**/*.sol" "script/**/*.sol"

      - name: Slither
        uses: crytic/slither-action@v0.4.1
        with:
          target: src
          fail-on: medium

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend prettier
        working-directory: frontend
        run: npm run format:check

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Subgraph install
        working-directory: subgraph
        run: npm ci

      - name: Subgraph codegen
        working-directory: subgraph
        run: npm run codegen

      - name: Subgraph build
        working-directory: subgraph
        run: npm run build
